services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: opera
      POSTGRES_PASSWORD: opera
      POSTGRES_DB: opera_bridge
    ports:
      - "5432:5432"
    volumes:
      - opera_bridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opera -d opera_bridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://opera:opera@db:5432/opera_bridge
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  opera_bridge_pgdata:
